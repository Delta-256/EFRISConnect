name: Manager.io Auto-Update

on:
  schedule:
    # Runs every Monday at 2:00 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check for new Manager.io image
        run: |
          DIGEST=$(docker manifest inspect ghcr.io/aliyusuf95/manager.io:latest 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('config',{}).get('digest','unknown'))" 2>/dev/null || echo "unknown")
          echo "Latest Manager.io digest: $DIGEST"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Restart Manager.io container on Azure
        run: |
          az container restart --resource-group manager-rg --name manager-io
          echo "Manager.io container restarted — will pull latest image on next rebuild"
