name: Build and Push Backend to ACR

on:
  push:
    branches: [main, claude/focused-einstein-48bo93]
    paths:
      - 'backend/**'
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: twoservantsacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: twoservantsacr.azurecr.io/efris-backend:latest
          build-args: |
            EFRIS_PRIVATE_KEY=${{ secrets.EFRIS_PRIVATE_KEY }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Restart container to pick up new image
        run: az container restart --resource-group manager-rg --name efris-backend || true
