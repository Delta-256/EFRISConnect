name: Build and Push Backend to ACR

on:
  push:
    branches: [main, claude/focused-einstein-48bo93]
    paths:
      - 'backend/**'
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: twoservantsacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: twoservantsacr.azurecr.io/efris-backend:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update container with private key as runtime env var
        run: |
          az container create \
            --resource-group manager-rg \
            --name efris-backend \
            --image twoservantsacr.azurecr.io/efris-backend:latest \
            --registry-login-server twoservantsacr.azurecr.io \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --environment-variables NODE_ENV=production \
            --secure-environment-variables "EFRIS_PRIVATE_KEY_B64=${{ secrets.EFRIS_PRIVATE_KEY_B64 }}" \
            --restart-policy Always \
            --os-type Linux \
            --cpu 1 \
            --memory 1 \
            --ports 3000 \
            --dns-name-label efris-backend
